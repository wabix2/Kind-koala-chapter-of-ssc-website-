<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kind Koala | SSC Ethiopia Chapter</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Favicon -->
<link rel="icon" href="https://i.ibb.co/p6TFy7J6/logo.jpg" type="image/jpg">

<style>
:root{
  --primary:#1a4d36;
  --secondary:#2d6a4f;
  --accent:#d4a373;
  --bg-soft:#f8faf9;
  --white:#ffffff;
  --text-main:#1a1c1b;
  --text-muted:#525c58;
  --shadow-sm:0 6px 25px rgba(0,0,0,0.05);
  --radius:24px;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg-soft);
  color:var(--text-main);
  line-height:1.6;
  scroll-behavior:smooth;
}

h1,h2,h3,h4{
  font-family:'Plus Jakarta Sans',sans-serif;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:0 1.5rem;
}

/* HEADER */
header{
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
  z-index:1000;
  border-bottom:1px solid rgba(0,0,0,0.05);
  transition:0.3s ease;
}

nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:1rem 0;
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
  text-decoration:none;
}

.logo-img{
  width:55px;
  height:55px;
  object-fit:contain;
  border-radius:10px;
}

.brand-text{
  font-weight:800;
  font-size:1.2rem;
  color:var(--primary);
}

.brand-text span{
  display:block;
  font-size:0.7rem;
  font-weight:600;
  color:var(--accent);
  text-transform:uppercase;
}

.nav-menu{
  display:flex;
  gap:1.5rem;
  list-style:none;
}

.nav-menu a{
  text-decoration:none;
  color:var(--text-main);
  font-weight:600;
  font-size:0.95rem;
  transition:0.3s;
}

.nav-menu a:hover{
  color:var(--secondary);
}

/* HERO */
.hero{
  padding:120px 0 80px;
  background:radial-gradient(circle at top right,#eef7f2 0%,#f8faf9 70%);
}

.hero-content{
  display:grid;
  grid-template-columns:1.2fr 0.8fr;
  gap:3rem;
  align-items:center;
}

.hero h1{
  font-size:clamp(2.2rem,5vw,3.5rem);
  margin-bottom:1rem;
  color:var(--primary);
}

.hero p{
  font-size:1.1rem;
  color:var(--text-muted);
  margin-bottom:2rem;
}

.hero a{
  padding:15px 35px;
  background:var(--primary);
  color:white;
  border-radius:50px;
  text-decoration:none;
  font-weight:700;
  display:inline-block;
  transition:0.3s;
}

.hero a:hover{
  background:var(--secondary);
}

.hero-visual i{
  font-size:10rem;
  color:#d8f3dc;
  animation:float 6s ease-in-out infinite;
  text-align:center;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-15px);}
}

/* RESPONSIVE */
@media(max-width:968px){
  .hero-content{
    grid-template-columns:1fr;
    text-align:center;
  }

  .hero-visual{
    display:none;
  }

  .nav-menu{
    display:none;
  }

  .logo-img{
    width:45px;
    height:45px;
  }
}
</style>
</head>

<body>

<header id="main-header">
<div class="container">
<nav>
<a href="#" class="brand">
  <img src="https://i.ibb.co/p6TFy7J6/logo.jpg" alt="Kind Koala Logo" class="logo-img">
  <div class="brand-text">
    Kind Koala
    <span>SSC Ethiopia Chapter</span>
  </div>
</a>

<ul class="nav-menu">
<li><a href="#about">About</a></li>
<li><a href="#it-team">IT Team</a></li>
<li><a href="#join">Join Us</a></li>
</ul>
</nav>
</div>
</header>

</body>
</html>
